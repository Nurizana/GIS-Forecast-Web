<!DOCTYPE html>
<html>
<head>
    <title>Pilot GIS Forecast Web</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        
        /* Styling for the custom headers inside the layer control */
        .layer-control-header {
            font-weight: bold;
            font-size: 14px;
            margin: 5px 0 5px 0;
            padding-bottom: 2px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Define Base Maps
        var esriOcean = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 13
        });
        var esriOceanLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 13
        });
        var blueOceanMap = L.layerGroup([esriOcean, esriOceanLabels]);

        var esriSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });
        var esriSatLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 20
        });
        var satelliteMap = L.layerGroup([esriSatellite, esriSatLabels]);

        // 2. Initialize the Map
        var map = L.map('map', {
            center: [4.2105, 101.9758], // Centered on Malaysia
            zoom: 5,
            layers: [blueOceanMap] // Default base layer
        });

        // 3. Create the 5 Degree Grid Overlay
        var gridLayer = L.layerGroup();
        // Generate Latitude lines
        for (var lat = -90; lat <= 90; lat += 5) {
            L.polyline([[lat, -180], [lat, 180]], {color: '#888', weight: 1, opacity: 0.6, dashArray: '4, 4'}).addTo(gridLayer);
        }
        // Generate Longitude lines
        for (var lon = -180; lon <= 180; lon += 5) {
            L.polyline([[-90, lon], [90, lon]], {color: '#888', weight: 1, opacity: 0.6, dashArray: '4, 4'}).addTo(gridLayer);
        }

        // 4. Create Country Borders Overlay (Fetches open-source GeoJSON)
        var countryBorders = L.layerGroup();
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#222", weight: 1.5, fillOpacity: 0 }
                }).addTo(countryBorders);
            });

        // 5. Create Malaysia States Overlay (Fetches open-source GeoJSON)
        var malaysiaStates = L.layerGroup();
        fetch('https://raw.githubusercontent.com/TindakMalaysia/maps/master/malaysia/geojson/malaysia.state.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#ff0000", weight: 1.5, fillOpacity: 0.1 }
                }).addTo(malaysiaStates);
            });

        // 6. Define Layer Controls Object
        var baseMaps = {
            "ESRI Blue Ocean": blueOceanMap,
            "ESRI Satellite": satelliteMap
        };

        var overlayMaps = {
            "5 Degree Grid": gridLayer,
            "Country Borders": countryBorders,
            "Malaysia States": malaysiaStates
        };

        // 7. Add standard Leaflet control (combines base maps as radio buttons and overlays as checkboxes)
        var layerControl = L.control.layers(baseMaps, overlayMaps, {
            position: 'topright',
            collapsed: false
        }).addTo(map);

        // 8. Inject Titles into the control panel
        // This DOM manipulation adds "Base Map" and "Overlays" headers inside the Leaflet control box
        var baseMapContainer = document.querySelector('.leaflet-control-layers-base');
        var overlayContainer = document.querySelector('.leaflet-control-layers-overlays');

        var baseTitle = document.createElement('div');
        baseTitle.innerHTML = "Base Map";
        baseTitle.className = 'layer-control-header';
        baseMapContainer.insertBefore(baseTitle, baseMapContainer.firstChild);

        var overlayTitle = document.createElement('div');
        overlayTitle.innerHTML = "Overlays";
        overlayTitle.className = 'layer-control-header';
        overlayContainer.insertBefore(overlayTitle, overlayContainer.firstChild);

    </script>
</body>
</html>
